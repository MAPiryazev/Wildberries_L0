<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск заказа</title>
</head>
<body>
    <h1>Поиск заказа</h1>
    <input type="text" id="uid" placeholder="Введите UID заказа">
    <button onclick="fetchOrder()">Получить заказ</button>
    <pre id="result"></pre>

    <script>
        async function fetchOrder() {
            const uid = document.getElementById('uid').value.trim();
            if (!uid) {
                alert("Пожалуйста, введите UID заказа");
                return;
            }
            try {
                const res = await fetch(`/order/${uid}`);
                if (!res.ok) {
                    document.getElementById('result').innerText = "Заказ не найден";
                    return;
                }
                const data = await res.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('result').innerText = "Ошибка: " + err;
            }
        }
    </script>
</body>
</html>
